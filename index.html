<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JavaScript文件加密工具</title>
    <script src="crypto-js.min.js"></script> 
    <link rel="stylesheet" href="atom-one-dark.min.css"> 
    <link rel="stylesheet" href="all.min.css"> 
    <style>
        body {
            font-family: 'Comic Sans MS', '微软雅黑', sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        .container {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: 2px dashed #4CAF50;
        }
        h1 {
            color: #FF5722;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            font-family: 'Comic Sans MS', cursive;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #9C27B0;
        }
        textarea, input[type="text"], input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
            background-color: #f9f9f9;
            transition: all 0.3s;
        }
        textarea:focus, input[type="text"]:focus {
            border-color: #FF9800;
            box-shadow: 0 0 8px rgba(255, 152, 0, 0.4);
        }
        textarea {
            height: 200px;
            font-family: monospace;
        }
        button {
            background-color: #FF9800;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin: 5px;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 10px rgba(0,0,0,0.2);
        }
        button:active {
            transform: translateY(1px);
        }
        .tab {
            overflow: hidden;
            border: 1px solid #FF9800;
            background-color: #FFF3E0;
            border-radius: 8px 8px 0 0;
        }
        .tab button {
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 12px 20px;
            transition: 0.3s;
            color: #E65100;
            font-family: 'Comic Sans MS', cursive;
        }
        .tab button:hover {
            background-color: #FFE0B2;
        }
        .tab button.active  {
            background-color: #FF9800;
            color: white;
        }
        .tabcontent {
            display: none;
            padding: 20px;
            border: 1px solid #FF9800;
            border-top: none;
            border-radius: 0 0 8px 8px;
            background-color: white;
        }
        .result-area {
            margin-top: 20px;
            background-color: #E3F2FD;
            padding: 15px;
            border-radius: 8px;
        }
        .file-info {
            margin-top: 10px;
            font-style: italic;
            color: #607D8B;
        }
        
        .funny-tip {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background-color: #4CAF50;
            color: white;
            padding: 10px 15px;
            border-radius: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            z-index: 1000;
            max-width: 200px;
            display: none;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        
        @keyframes shake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            50% { transform: rotate(0deg); }
            75% { transform: rotate(-5deg); }
            100% { transform: rotate(0deg); }
        }
        
        .shake {
            animation: shake 0.5s;
        }

        /* 备案信息样式 */
        .footer {
            margin-top: 40px;
            font-size: 14px;
            text-align: center;
            line-height: 1.5;
        }

        .footer .red-text {
            color: red;
            display: inline-block;
            margin-bottom: 5px;
        }

        .footer .black-text {
            color: black;
            text-decoration: none;
            margin: 0 10px;
        }

        .footer .gongan-icon {
            vertical-align: middle;
            width: 20px;
            height: 20px;
            margin-right: 5px;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .footer {
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .footer .black-text {
                margin: 5px 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>JavaScript文件加密工具</i></h1>

        <div class="tab">
            <button class="tablinks active" onclick="openTab(event, 'inputTab')">输入代码</i></button>
            <button class="tablinks" onclick="openTab(event, 'fileTab')">上传文件</i></button>
        </div>

        <div id="inputTab" class="tabcontent" style="display: block;">
            <div class="form-group">
                <label for="jsCode">输入要加密的 JavaScript 代码:</label>
                <textarea id="jsCode" placeholder="在此粘贴您的JavaScript代码..."></textarea>
            </div>
        </div>

        <div id="fileTab" class="tabcontent">
            <div class="form-group">
                <label for="jsFile">选择 JavaScript 文件:</label>
                <input type="file" id="jsFile" accept=".js">
                <div id="fileInfo" class="file-info"></div>
            </div>
        </div>

        <div class="form-group">
            <label for="encryptionKey">加密密钥 (建议32字符以上):</label>
            <input type="text" id="encryptionKey" placeholder="输入加密密钥...">
            <small style="color: #888;">提示：可以用"忆痕发布页www.937788.xyz"这样好记的密钥</small>
        </div>

        <div class="form-group">
            <label for="copyrightNotice">自定义版权声明:</label>
            <input type="text" id="copyrightNotice" placeholder="例如: /* 忆痕发布页 www.937788.xyz */" value="/* 忆痕发布页 www.937788.xyz - 未经授权禁止反编译 */">
        </div>

        <button onclick="encryptCode()" id="encryptBtn"></i> 加密代码</button>

        <div class="result-area">
            <label for="encryptedResult">加密结果:</label>
            <textarea id="encryptedResult" readonly></textarea>
            <button onclick="copyToClipboard()"></i> 复制到剪贴板</button>
            <button onclick="testEncryptedCode()"></i> 测试运行加密代码</button>
            <button onclick="downloadEncryptedCode()"></i> 下载加密文件</button>
        </div>

        <div class="funny-tip" id="funnyTip">
            代码千万行，安全第一行！</i>
        </div>
    </div>

    <!-- 底部备案信息 -->
    <div class="footer">
        <span class="red-text">本站内容仅供学习和交流，非商业用途</span>
        <br>
        <a href="https://beian.miit.gov.cn/" class="black-text">浙ICP备2025187466号</a>
        <a href="https://www.beian.gov.cn/portal/registerSystemInfo?recordcode=33030402001483" class="black-text">
            <img src="https://www.937788.xyz/gonganbeian.png" alt="公安备案" class="gongan-icon" />
            浙公网安备33030402001483号
        </a>
    </div>

    <script>
        function openTab(evt, tabName) {
            const tabcontent = document.getElementsByClassName("tabcontent"); 
            for (let i = 0; i < tabcontent.length;  i++) {
                tabcontent[i].style.display  = "none";
            }

            const tablinks = document.getElementsByClassName("tablinks"); 
            for (let i = 0; i < tablinks.length;  i++) {
                tablinks[i].className = tablinks[i].className.replace("  active", "");
            }

            document.getElementById(tabName).style.display  = "block";
            evt.currentTarget.className  += " active";

            if (tabName === 'fileTab' && !document.getElementById('jsFile').hasAttribute('data-listener'))  {
                document.getElementById('jsFile').addEventListener('change',  handleFileSelect, false);
                document.getElementById('jsFile').setAttribute('data-listener',  'true');
            }

            document.getElementById('funnyTip').style.display  = 'block';
            setTimeout(() => {
                document.getElementById('funnyTip').style.display  = 'none';
            }, 3000);
        }

        function handleFileSelect(event) {
            const file = event.target.files[0]; 
            if (!file) return;

            const fileInfo = document.getElementById('fileInfo'); 
            fileInfo.innerHTML  = `已选择文件: <strong>${file.name}</strong>  (${(file.size  / 1024).toFixed(2)} KB) </i>`;

            const reader = new FileReader();
            reader.onload  = function(e) {
                document.getElementById('jsCode').value  = e.target.result; 
            };
            reader.readAsText(file); 

            document.getElementById('funnyTip').textContent  = '文件已加载，准备加密吧！';
            document.getElementById('funnyTip').style.display  = 'block';
            setTimeout(() => {
                document.getElementById('funnyTip').style.display  = 'none';
            }, 3000);
        }

        function strongEncrypt(code, key, copyrightNotice) {
            const salt = CryptoJS.lib.WordArray.random(128/8); 
            const iv = CryptoJS.lib.WordArray.random(128/8); 

            const iterations = 10000;
            const keySize = 256/32;
            const derivedKey = CryptoJS.PBKDF2(key, salt, {
                keySize: keySize,
                iterations: iterations 
            });

            const encrypted = CryptoJS.AES.encrypt(code,  derivedKey, { 
                iv: iv,
                padding: CryptoJS.pad.Pkcs7, 
                mode: CryptoJS.mode.CBC  
            });

            const encryptedData = {
                ct: encrypted.ciphertext.toString(CryptoJS.enc.Base64), 
                iv: iv.toString(CryptoJS.enc.Hex), 
                salt: salt.toString(CryptoJS.enc.Hex), 
                iter: iterations,
                site: "www.937788.xyz", 
                qq: "937750307"
            };

            const hmacKey = CryptoJS.PBKDF2(key + "hmac", salt, {
                keySize: keySize,
                iterations: iterations 
            });
            const hmac = CryptoJS.HmacSHA256(JSON.stringify(encryptedData),  hmacKey);
            encryptedData.hmac  = hmac.toString(CryptoJS.enc.Hex); 

            const encryptedJson = JSON.stringify(encryptedData); 
            const base64Encoded = CryptoJS.enc.Utf8.parse(encryptedJson).toString(CryptoJS.enc.Base64); 

            const finalCode = `${copyrightNotice}\n// ----- 加密内容开始 -----\n` +
                `(function(){try{var _0x=${JSON.stringify(base64Encoded)};`  +
                `var _1x=JSON.parse(CryptoJS.enc.Base64.parse(_0x).toString(CryptoJS.enc.Utf8));`  +
                `var _2x=CryptoJS.PBKDF2(${JSON.stringify(key)},CryptoJS.enc.Hex.parse(_1x.salt),{keySize:8,iterations:_1x.iter});`  +
                `var _3x=CryptoJS.PBKDF2(${JSON.stringify(key)}+'hmac',CryptoJS.enc.Hex.parse(_1x.salt),{keySize:8,iterations:_1x.iter});`  +
                `var _4x=CryptoJS.HmacSHA256(JSON.stringify({ct:_1x.ct,iv:_1x.iv,salt:_1x.salt,iter:_1x.iter}),_3x).toString(CryptoJS.enc.Hex);`  +
                `if(_4x!==_1x.hmac)throw  new Error('完整性校验失败');` +
                `var _5x=CryptoJS.AES.decrypt(_1x.ct,_2x,{iv:CryptoJS.enc.Hex.parse(_1x.iv),padding:CryptoJS.pad.Pkcs7,mode:CryptoJS.mode.CBC});`  +
                `return eval(_5x.toString(CryptoJS.enc.Utf8));}catch(e){console.error(' 解密失败:',e);return null;}})();`;
            
            return finalCode;
        }

        function encryptCode() {
            const jsCode = document.getElementById('jsCode').value; 
            const encryptionKey = document.getElementById('encryptionKey').value; 
            const copyrightNotice = document.getElementById('copyrightNotice').value; 

            if (!jsCode) {
                showFunnyAlert('请先输入代码或上传文件', 'error');
                return;
            }

            if (!encryptionKey) {
                showFunnyAlert('请输入加密密钥', 'error');
                return;
            }

            if (encryptionKey.length  < 16) {
                if (!confirm('警告: 加密密钥较短(建议32字符以上)，是否继续?\n小提示：可以用"忆痕发布页www.937788.xyz"这样好记的密钥')) {
                    return;
                }
            }

            try {
                const btn = document.getElementById('encryptBtn'); 
                btn.classList.add('shake'); 
                setTimeout(() => {
                    btn.classList.remove('shake'); 
                }, 500);

                document.getElementById('funnyTip').textContent  = '加密中...正在保护您的代码！';
                document.getElementById('funnyTip').style.display  = 'block';

                setTimeout(() => {
                    const encryptedCode = strongEncrypt(jsCode, encryptionKey, copyrightNotice);
                    document.getElementById('encryptedResult').value  = encryptedCode;

                    document.getElementById('funnyTip').textContent  = '加密成功！代码已保护！';
                    document.getElementById('funnyTip').style.display  = 'block';
                    setTimeout(() => {
                        document.getElementById('funnyTip').style.display  = 'none';
                    }, 3000);
                }, 1000);
            } catch (e) {
                showFunnyAlert('加密过程中出错: ' + e.message,  'error');
                console.error(e); 
            }
        }

        function showFunnyAlert(message, type) {
            const tip = document.getElementById('funnyTip'); 
            tip.textContent  = message;
            tip.style.backgroundColor  = type === 'error' ? '#F44336' : '#4CAF50';
            tip.style.display  = 'block';

            setTimeout(() => {
                tip.style.display  = 'none';
            }, 3000);
        }

        function copyToClipboard() {
            const resultTextarea = document.getElementById('encryptedResult'); 
            if (!resultTextarea.value)  {
                showFunnyAlert('没有可复制的内容', 'error');
                return;
            }

            resultTextarea.select(); 
            document.execCommand('copy'); 

            document.getElementById('funnyTip').textContent  = '已复制到剪贴板！';
            document.getElementById('funnyTip').style.display  = 'block';
            setTimeout(() => {
                document.getElementById('funnyTip').style.display  = 'none';
            }, 3000);
        }

        function testEncryptedCode() {
            const encryptedCode = document.getElementById('encryptedResult').value; 
            if (!encryptedCode) {
                showFunnyAlert('没有可测试的加密代码', 'error');
                return;
            }

            try {
                console.log('-----  加密代码测试开始 -----');
                console.log(' 联系QQ: 80070617');
                eval(encryptedCode);
                console.log('-----  加密代码测试完成 -----');
                showFunnyAlert('加密代码运行成功，请查看控制台输出', 'success');
            } catch (e) {
                console.error(' 加密代码运行错误:', e);
                showFunnyAlert('加密代码运行出错: ' + e.message,  'error');
            }
        }

        function downloadEncryptedCode() {
            const encryptedCode = document.getElementById('encryptedResult').value; 
            if (!encryptedCode) {
                showFunnyAlert('没有可下载的加密代码', 'error');
                return;
            }

            let filename = '加密_' + new Date().toISOString().slice(0, 10) + '.js';
            const fileInput = document.getElementById('jsFile'); 
            if (fileInput.files.length  > 0) {
                const originalName = fileInput.files[0].name; 
                filename = '加密_' + originalName;
            }

            const blob = new Blob([encryptedCode], { type: 'application/javascript' });
            const url = URL.createObjectURL(blob); 

            const a = document.createElement('a'); 
            a.href  = url;
            a.download  = filename;
            document.body.appendChild(a); 
            a.click(); 

            setTimeout(() => {
                document.body.removeChild(a); 
                URL.revokeObjectURL(url); 
            }, 100);

            document.getElementById('funnyTip').textContent  = '文件下载完成！';
            document.getElementById('funnyTip').style.display  = 'block';
            setTimeout(() => {
                document.getElementById('funnyTip').style.display  = 'none';
            }, 3000);
        }

        window.addEventListener('DOMContentLoaded',  function() {
            setTimeout(() => {
                document.getElementById('funnyTip').textContent  = '欢迎使用本工具！'; 
                document.getElementById('funnyTip').style.display  = 'block';
                setTimeout(() => {
                    document.getElementById('funnyTip').style.display  = 'none';
                }, 3000);
            }, 1000);
        });
    </script>
</body>
</html>
